name: "Helix dev journey"
level: journey
base_url: "https://postlaryngeal-gretta-prescient.ngrok-free.dev"
http_base_url: "https://postlaryngeal-gretta-prescient.ngrok-free.dev"

auth:
  provider: supabase
  email: "bright-maple@replicantx.org"
  password: "Du-CIjqhbQgrZXzC"
  project_url: "{{ env.SUPABASE_URL }}"
  api_key: "{{ env.SUPABASE_ANON_KEY }}"

vars:
  conversation_id: "{{ env.CONVERSATION_ID }}"
  given_name: "{{ env.SUPABASE_GIVEN_NAME }}"
  family_name: "{{ env.SUPABASE_FAMILY_NAME }}"

steps:
  - id: bootstrap
    http:
      method: GET
      path: /helix/bootstrap
      headers:
        content-type: application/json
        ngrok-skip-browser-warning: "true"
      expect:
        status: 200
      extract:
        conversation_id:
          from: response.json
          jsonpath: $.conversation_id

  - id: submit-onboarding
    http:
      method: POST
      path: /helix/submit-form
      headers:
        content-type: application/json
        X-Conversation-ID: "{{ vars.conversation_id }}"
        ngrok-skip-browser-warning: "true"
      json:
        conversation_id: "{{ vars.conversation_id }}"
        form_id: "form.system.profile.onboarding.v1"
        expert: "system"
        data:
          given_name: "{{ vars.given_name }}"
          family_name: "{{ vars.family_name }}"
          email: "{{ env.SUPABASE_EMAIL }}"
          phone_number: "+15555550123"
          home_city: "London"
          country_of_residence: "GB"
          preferred_currency: "GBP"
          privacy_terms_consent: true
          traveler_info_sharing_consent: true
          gender: "unspecified"
          state_of_residence: "London"
      expect:
        status: 200

  - id: ask-flight
    http:
      method: POST
      path: /ask
      headers:
        content-type: application/json
        X-Conversation-ID: "{{ vars.conversation_id }}"
        ngrok-skip-browser-warning: "true"
      json:
        message: "Find flights to Madrid next Friday, returning Monday after."
      expect:
        status: 200
        jsonpath_exists:
          - $.response_to_user
          - $.conversation_id
          - $.ui_action.results
      extract:
        flight_offer_id:
          from: response.json
          jsonpath: $.ui_action.results[0].id
        flight_amount:
          from: response.json
          jsonpath: $.ui_action.results[0].total_amount
        flight_currency:
          from: response.json
          jsonpath: $.ui_action.results[0].total_currency
        flight_airline:
          from: response.json
          jsonpath: $.ui_action.results[0].airline
        flight_depart_airport:
          from: response.json
          jsonpath: $.ui_action.results[0].departure_airport_name
        flight_arrive_airport:
          from: response.json
          jsonpath: $.ui_action.results[0].arrival_airport_name
        flight_depart_time:
          from: response.json
          jsonpath: $.ui_action.results[0].departure_time
        flight_arrive_time:
          from: response.json
          jsonpath: $.ui_action.results[0].arrival_time
        flight_return_depart_time:
          from: response.json
          jsonpath: $.ui_action.results[0].return_departure_time
        flight_return_arrive_time:
          from: response.json
          jsonpath: $.ui_action.results[0].return_arrival_time
        flight_cabin_class:
          from: response.json
          jsonpath: $.ui_action.results[0].cabin_class
        flight_origin:
          from: response.json
          jsonpath: $.ui_action.results[0].departure_airport_iata
        flight_destination:
          from: response.json
          jsonpath: $.ui_action.results[0].arrival_airport_iata
        flight_depart_date:
          from: response.json
          jsonpath: $.ui_action.results[0].departure_date
        flight_return_date:
          from: response.json
          jsonpath: $.ui_action.results[0].return_date
        flight_result_set_id:
          from: response.json
          jsonpath: $.ui_action.result_set_id

  - id: passenger-form
    http:
      method: POST
      path: /helix/passenger-form
      headers:
        content-type: application/json
        X-Conversation-ID: "{{ vars.conversation_id }}"
        ngrok-skip-browser-warning: "true"
      json:
        conversation_id: "{{ vars.conversation_id }}"
        selected_flight_index: 0
        result_set_id: "{{ vars.flight_result_set_id }}"
        passengers: 1
      expect:
        status: 200
        jsonpath_exists:
          - $.form

  - id: create-flight-booking
    http:
      method: POST
      path: /helix/bookings/create-pending
      headers:
        content-type: application/json
        X-Conversation-ID: "{{ vars.conversation_id }}"
        ngrok-skip-browser-warning: "true"
      json:
        conversation_id: "{{ vars.conversation_id }}"
        booking_type: "flight"
        offer_snapshot:
          id: "{{ vars.flight_offer_id }}"
          airline: "{{ vars.flight_airline }}"
          total_amount: "{{ vars.flight_amount }}"
          total_currency: "{{ vars.flight_currency }}"
          departure_time: "{{ vars.flight_depart_time }}"
          arrival_time: "{{ vars.flight_arrive_time }}"
          departure_airport_name: "{{ vars.flight_depart_airport }}"
          arrival_airport_name: "{{ vars.flight_arrive_airport }}"
          departure_airport_iata: "{{ vars.flight_origin }}"
          arrival_airport_iata: "{{ vars.flight_destination }}"
          departure_date: "{{ vars.flight_depart_date }}"
          return_date: "{{ vars.flight_return_date }}"
          return_departure_time: "{{ vars.flight_return_depart_time }}"
          return_arrival_time: "{{ vars.flight_return_arrive_time }}"
          cabin_class: "{{ vars.flight_cabin_class }}"
          is_round_trip: true
        booking_intent:
          passengers_details:
            - given_name: "{{ vars.given_name }}"
              family_name: "{{ vars.family_name }}"
              gender: "unspecified"
              born_on: "1988-01-01"
              email: "{{ env.SUPABASE_EMAIL }}"
              phone_number: "+15555550123"
          offer_id: "{{ vars.flight_offer_id }}"
          result_set_id: "{{ vars.flight_result_set_id }}"
      expect:
        status: 200
        jsonpath_exists:
          - $.pending_booking_id
      extract:
        flight_booking_id:
          from: response.json
          jsonpath: $.pending_booking_id

  - id: assign-flight-to-trip
    http:
      method: POST
      path: /helix/bookings/{{ vars.flight_booking_id }}/assign-to-trip
      headers:
        content-type: application/json
        X-Conversation-ID: "{{ vars.conversation_id }}"
        ngrok-skip-browser-warning: "true"
      json:
        trip_title: "Madrid business trip"
        purpose: "Business"
        purpose_category: "business"
        origin: "{{ vars.flight_origin }}"
        start_date: "{{ vars.flight_depart_date }}"
        end_date: "{{ vars.flight_return_date }}"
        conversation_id: "{{ vars.conversation_id }}"
      expect:
        status: 200
        jsonpath_exists:
          - $.trip_id
      extract:
        trip_id:
          from: response.json
          jsonpath: $.trip_id

  - id: ask-hotel
    http:
      method: POST
      path: /ask
      headers:
        content-type: application/json
        X-Conversation-ID: "{{ vars.conversation_id }}"
        ngrok-skip-browser-warning: "true"
      json:
        message: "Add a hotel in Madrid for the same dates."
      expect:
        status: 200
        jsonpath_exists:
          - $.response_to_user
          - $.ui_action
      extract:
        hotel_offer_id:
          from: response.json
          jsonpath: $.ui_action.results[0].id
        hotel_destination:
          from: response.json
          jsonpath: $.ui_action.results[0].location
        hotel_check_in:
          from: response.json
          jsonpath: $.ui_action.results[0].check_in_date
        hotel_check_out:
          from: response.json
          jsonpath: $.ui_action.results[0].check_out_date
        hotel_result_set_id:
          from: response.json
          jsonpath: $.ui_action.results[0].result_set_id
        hotel_id:
          from: response.json
          jsonpath: $.ui_action.results[0].hotel_id
        hotel_name:
          from: response.json
          jsonpath: $.ui_action.results[0].hotel_name
        hotel_room_type:
          from: response.json
          jsonpath: $.ui_action.results[0].room_type
        hotel_room_code:
          from: response.json
          jsonpath: $.ui_action.results[0].room_code
        hotel_total_price:
          from: response.json
          jsonpath: $.ui_action.results[0].total_price
        hotel_currency:
          from: response.json
          jsonpath: $.ui_action.results[0].currency
        hotel_lat:
          from: response.json
          jsonpath: $.ui_action.results[0].latitude
        hotel_lng:
          from: response.json
          jsonpath: $.ui_action.results[0].longitude

  - id: create-hotel-booking
    http:
      method: POST
      path: /helix/bookings/create-pending
      headers:
        content-type: application/json
        X-Conversation-ID: "{{ vars.conversation_id }}"
        ngrok-skip-browser-warning: "true"
      json:
        conversation_id: "{{ vars.conversation_id }}"
        booking_type: "hotel"
        offer_snapshot:
          hotel_name: "{{ vars.hotel_name }}"
          property_name: "{{ vars.hotel_name }}"
          hotel_id: "{{ vars.hotel_id }}"
          location: "{{ vars.hotel_destination }}"
          latitude: "{{ vars.hotel_lat }}"
          longitude: "{{ vars.hotel_lng }}"
          check_in_date: "{{ vars.hotel_check_in }}"
          check_out_date: "{{ vars.hotel_check_out }}"
          guests: 1
          room_type: "{{ vars.hotel_room_type }}"
          room_code: "{{ vars.hotel_room_code }}"
          total_amount: "{{ vars.hotel_total_price }}"
          total_price: "{{ vars.hotel_total_price }}"
          currency: "{{ vars.hotel_currency }}"
        booking_intent:
          guest_details:
            first_name: "{{ vars.given_name }}"
            last_name: "{{ vars.family_name }}"
            email: "{{ env.SUPABASE_EMAIL }}"
            phone: "+15555550123"
          first_name: "{{ vars.given_name }}"
          last_name: "{{ vars.family_name }}"
          email: "{{ env.SUPABASE_EMAIL }}"
          phone: "+15555550123"
          phone_number: "+15555550123"
          guest_name: "{{ vars.given_name }} {{ vars.family_name }}"
          destination_city: "{{ vars.hotel_destination }}"
          check_in_date: "{{ vars.hotel_check_in }}"
          check_out_date: "{{ vars.hotel_check_out }}"
          hotel_id: "{{ vars.hotel_id }}"
          hotel_name: "{{ vars.hotel_name }}"
          room_code: "{{ vars.hotel_room_code }}"
        offer_id: "{{ vars.hotel_offer_id }}"
        result_set_id: "{{ vars.hotel_result_set_id }}"
      expect:
        status: 200
        jsonpath_exists:
          - $.pending_booking_id
      extract:
        hotel_booking_id:
          from: response.json
          jsonpath: $.pending_booking_id

  - id: assign-hotel-to-trip
    http:
      method: POST
      path: /helix/bookings/{{ vars.hotel_booking_id }}/assign-to-trip
      headers:
        content-type: application/json
        X-Conversation-ID: "{{ vars.conversation_id }}"
        ngrok-skip-browser-warning: "true"
      json:
        trip_id: "{{ vars.trip_id }}"
        conversation_id: "{{ vars.conversation_id }}"
      expect:
        status: 200

  - id: submit-trip
    http:
      method: POST
      path: /helix/trips/{{ vars.trip_id }}/submit
      headers:
        content-type: application/json
        X-Conversation-ID: "{{ vars.conversation_id }}"
        ngrok-skip-browser-warning: "true"
      json:
        conversation_id: "{{ vars.conversation_id }}"
      expect:
        status: 200
